global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  #  Backend (FastAPI)
  - job_name: "taskmanager-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics

  #  Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  #  Node Exporter (system metrics)
  - job_name: "node"
    static_configs:
      - targets: ["node_exporter:9100"]

